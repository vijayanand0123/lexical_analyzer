  <style>
    :root{--bg:#0d0f14;--card:#13161e;--card2:#1a1d27;--border:#252836;
      --accent:#ff9900;--accent2:#ffb84d;--text:#e8eaf0;--muted:#6b7280;

    textarea{width:100%;min-height:260px;padding:14px;border-radius:10px;border:1px solid var(--border);
      background:#0a0c12;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:12.5px;resize:vertical;outline:none;tab-size:2;line-height:1.65;}
    textarea:focus{border-color:rgba(255,153,0,.5);box-shadow:0 0 0 3px rgba(255,153,0,.1);}

      padding:9px 18px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;}
    .btn-sec{background:rgba(255,153,0,.08);border:1px solid rgba(255,153,0,.25);color:var(--accent2);
      border-radius:9px;padding:9px 14px;cursor:pointer;font-weight:600;font-size:12.5px;font-family:'Inter',sans-serif;}
    .btn-clear{background:transparent;border:1px solid var(--border);color:var(--muted);
      border-radius:9px;padding:9px 14px;cursor:pointer;font-size:12.5px;font-family:'Inter',sans-serif;}
    .status{color:var(--muted);font-size:12px;flex:1;min-width:80px;}
    .tw{max-height:420px;overflow:auto;border-radius:8px;border:1px solid var(--border);}
    .tw::-webkit-scrollbar{width:6px;height:6px;} .tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    table{width:100%;border-collapse:collapse;} thead{position:sticky;top:0;background:#0a0c12;z-index:1;}

    .sbadges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .badge{padding:3px 8px;border-radius:5px;font-weight:700;font-size:10.5px;font-family:'JetBrains Mono',monospace;}
    .badge.KEYWORD{color:var(--purple);background:rgba(167,139,250,.12);}
    .badge.IDENTIFIER{color:var(--accent2);background:rgba(255,184,77,.1);}
    .badge.INTEGER,.badge.FLOAT{color:var(--green);background:rgba(34,197,94,.1);}
    .badge.STRING{color:var(--orange);background:rgba(251,146,60,.1);}
    .badge.OPERATOR{color:var(--indigo);background:rgba(129,140,248,.1);}
    .badge.DELIMITER{color:var(--pink);background:rgba(244,114,182,.1);}
    .badge.COMMENT{color:var(--muted);background:rgba(107,114,128,.1);}
    .badge.PREPROCESSOR{color:var(--teal);background:rgba(20,184,166,.1);}
    .badge.UNKNOWN{color:var(--red);background:rgba(239,68,68,.1);}
    footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:12px;}
    footer strong{color:var(--text);}
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="pill">âšˇ Prime Lexer</div>
    <h1>Lexer â€” Tokenize Source Code</h1>
    <p class="sub">C or Python source â†’ token stream. Auto-detects language and produces a correct token stream.</p>
  </header>

  <div class="card">
    <div class="card-title">đź“ť Source Code</div>
    <textarea id="code" spellcheck="false">#include &lt;stdio.h&gt;

int main() {
  int x = 2 + 3;
  printf("x = %d", x);
  return 0;
}</textarea>
    <div class="controls">
      <button class="btn" id="run">đź”Ť Tokenize</button>
      <button class="btn-sec" id="demo-c">Demo C</button>
      <button class="btn-sec" id="demo-py">Demo Python</button>
      <button class="btn-clear" id="clear-btn">Clear</button>
      <span class="status" id="status">Ready</span>
    </div>
  </div>

  <div class="card">
    <div class="sbadges" id="tok-sum"></div>
    <div class="tw">
      <table>
        <thead><tr><th>#</th><th>Type</th><th>Value</th><th>Line</th><th>Col</th></tr></thead>
        <tbody id="tok-tb"><tr><td colspan="5" class="empty">Run the lexer.</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* â”€â”€ KEYWORDS â”€â”€ */
const C_KEYWORDS = new Set([
  'auto','break','case','char','const','continue','default','do','double',
  'else','enum','extern','float','for','goto','if','inline','int','long',
  'register','return','short','signed','sizeof','static','struct','switch',
  'typedef','union','unsigned','void','volatile','while',
  /* common preprocessor identifiers treated as keywords in detection */
  'include','define','ifndef','ifdef','endif','pragma'
]);

const PY_KEYWORDS = new Set([
  'False','None','True','and','as','assert','async','await','break','class',
  'continue','def','del','elif','else','except','finally','for','from',
  'global','if','import','in','is','lambda','nonlocal','not','or','pass',
  'raise','return','try','while','with','yield'
]);

/* â”€â”€ LANGUAGE DETECTION â”€â”€ */
function detectLang(src) {
  // Strong C signals
  if (/^\s*#\s*include\b/.test(src)) return 'c';
  if (/\bint\s+main\s*\(/.test(src)) return 'c';
  if (/\bprintf\s*\(/.test(src)) return 'c';
  if (/\bvoid\s+\w+\s*\(/.test(src)) return 'c';
  // Strong Python signals
  if (/^\s*def\s+\w+\s*\(/m.test(src)) return 'py';
  if (/^\s*import\s+\w/m.test(src)) return 'py';
  if (/^\s*from\s+\w+\s+import\b/m.test(src)) return 'py';
  if (/:\s*\n/.test(src)) return 'py';
  return 'c'; // default
}

/* â”€â”€ LEXER â”€â”€ */
function tokenize(src) {
  const lang = detectLang(src);
  const KEYWORDS = lang === 'py' ? PY_KEYWORDS : C_KEYWORDS;
  const tokens = [];
  let i = 0, line = 1, col = 1;

  function addTok(type, val, ln, cl) {
    tokens.push({ type, value: val, line: ln, col: cl });
  }

  // Advance i and update line/col tracking
  function advance(count) {
    for (let k = 0; k < count; k++) {
      if (src[i] === '\n') { line++; col = 1; }
      else { col++; }
      i++;
    }
  }

  while (i < src.length) {
    const startLine = line;
    const startCol  = col;
    const ch = src[i];

    // â”€â”€ Newlines / carriage returns (skip, just track position)
    if (ch === '\r') {
      i++;
      if (src[i] === '\n') i++;
      line++; col = 1;
      continue;
    }
    if (ch === '\n') {
      i++; line++; col = 1;
      continue;
    }

    // â”€â”€ Other whitespace
    if (ch === ' ' || ch === '\t') {
      i++; col++;
      continue;
    }

    // â”€â”€ Block comment  /* ... */  (C only, but handle for both)
    if (src[i] === '/' && src[i + 1] === '*') {
      let j = i + 2;
      while (j < src.length - 1 && !(src[j] === '*' && src[j + 1] === '/')) {
        if (src[j] === '\n') { line++; col = 1; }
        else { col++; }
        j++;
      }
      j += 2; // skip */
      const raw = src.slice(i, j);
      addTok('COMMENT', raw, startLine, startCol);
      col += 2; i = j;
      continue;
    }

    // â”€â”€ Line comment  // ...  (C/C++)
    if (src[i] === '/' && src[i + 1] === '/') {
      let j = i;
      while (j < src.length && src[j] !== '\n' && src[j] !== '\r') j++;
      addTok('COMMENT', src.slice(i, j), startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ Python line comment  # ...
    if (lang === 'py' && ch === '#') {
      let j = i;
      while (j < src.length && src[j] !== '\n' && src[j] !== '\r') j++;
      addTok('COMMENT', src.slice(i, j), startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ C preprocessor directive  # ...  (only at start of (logical) line)
    if (lang === 'c' && ch === '#') {
      let j = i;
      // Preprocessor lines can be continued with backslash-newline
      while (j < src.length) {
        if (src[j] === '\\' && (src[j + 1] === '\n' || src[j + 1] === '\r')) {
          // continuation â€” skip the backslash and newline
          j += 2;
          if (src[j - 1] === '\r' && src[j] === '\n') j++;
          line++; col = 1;
        } else if (src[j] === '\n' || src[j] === '\r') {
          break;
        } else {
          j++;
        }
      }
      addTok('PREPROCESSOR', src.slice(i, j), startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ Python triple-quoted strings  """ or '''
    if (lang === 'py' && (src.slice(i, i + 3) === '"""' || src.slice(i, i + 3) === "'''")) {
      const q3 = src.slice(i, i + 3);
      let j = i + 3;
      while (j < src.length - 2 && src.slice(j, j + 3) !== q3) {
        if (src[j] === '\n') { line++; col = 1; }
        else { col++; }
        j++;
      }
      j += 3; // closing triple quote
      addTok('STRING', src.slice(i, j), startLine, startCol);
      col += 3; i = j;
      continue;
    }

    // â”€â”€ Single / double quoted string (handles escape sequences, single line)
    if (ch === '"' || ch === "'") {
      const q = ch;
      let j = i + 1;
      let s = q;
      while (j < src.length && src[j] !== q && src[j] !== '\n' && src[j] !== '\r') {
        if (src[j] === '\\' && j + 1 < src.length) {
          s += src[j] + src[j + 1];
          j += 2;
        } else {
          s += src[j];
          j++;
        }
      }
      if (j < src.length && src[j] === q) { s += q; j++; }
      addTok('STRING', s, startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ Numbers (integer and float)
    if (/[0-9]/.test(ch) || (ch === '.' && /[0-9]/.test(src[i + 1] || ''))) {
      let j = i;
      let isFloat = false;

      // Hex literal 0x...
      if (src[j] === '0' && (src[j + 1] === 'x' || src[j + 1] === 'X')) {
        j += 2;
        while (j < src.length && /[0-9a-fA-F]/.test(src[j])) j++;
      } else {
        // Decimal digits before potential dot
        while (j < src.length && /[0-9]/.test(src[j])) j++;
        // Fractional part
        if (j < src.length && src[j] === '.' && /[0-9]/.test(src[j + 1] || '')) {
          isFloat = true; j++;
          while (j < src.length && /[0-9]/.test(src[j])) j++;
        }
        // Exponent
        if (j < src.length && /[eE]/.test(src[j])) {
          isFloat = true; j++;
          if (j < src.length && /[+\-]/.test(src[j])) j++;
          while (j < src.length && /[0-9]/.test(src[j])) j++;
        }
        // Suffix (L, U, f, etc.)
        while (j < src.length && /[uUlLfF]/.test(src[j])) { if (/[fF]/.test(src[j])) isFloat = true; j++; }
      }

      addTok(isFloat ? 'FLOAT' : 'INTEGER', src.slice(i, j), startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ Identifiers and keywords
    if (/[a-zA-Z_]/.test(ch)) {
      let j = i;
      while (j < src.length && /[a-zA-Z0-9_]/.test(src[j])) j++;
      const word = src.slice(i, j);
      addTok(KEYWORDS.has(word) ? 'KEYWORD' : 'IDENTIFIER', word, startLine, startCol);
      col += j - i; i = j;
      continue;
    }

    // â”€â”€ Multi-character operators (check longest match first)
    const three = src.slice(i, i + 3);
    const TRIPLE_OPS = ['<<=', '>>=', '...'];
    if (TRIPLE_OPS.includes(three)) {
      addTok('OPERATOR', three, startLine, startCol);
      col += 3; i += 3; continue;
    }

    const two = src.slice(i, i + 2);
    const DOUBLE_OPS = [
      '==','!=','<=','>=','&&','||','++','--',
      '+=','-=','*=','/=','%=','&=','|=','^=',
      '->','**','>>', '<<', '::'
    ];
    if (DOUBLE_OPS.includes(two)) {
      addTok('OPERATOR', two, startLine, startCol);
      col += 2; i += 2; continue;
    }

    // â”€â”€ Single-character operators
    if ('+-*/%=<>!&|^~'.includes(ch)) {
      addTok('OPERATOR', ch, startLine, startCol);
      col++; i++; continue;
    }

    // â”€â”€ Delimiters
    if ('(){}[];:,.\\_@'.includes(ch)) {
      addTok('DELIMITER', ch, startLine, startCol);
      col++; i++; continue;
    }

    // â”€â”€ Unknown / unrecognised character
    addTok('UNKNOWN', ch, startLine, startCol);
    col++; i++;
  }

  return tokens;
}

/* â”€â”€ RENDER â”€â”€ */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function render(tokens) {
  const counts = {};
  for (const t of tokens) counts[t.type] = (counts[t.type] || 0) + 1;

  document.getElementById('tok-sum').innerHTML =
    Object.entries(counts)
      .map(([k, v]) => `<span class="badge ${esc(k)}">${esc(k)} <b>${v}</b></span>`)
      .join('') || '<span class="badge">No tokens</span>';

  const tb = document.getElementById('tok-tb');
  if (!tokens.length) {
    tb.innerHTML = '<tr><td colspan="5" class="empty">No tokens found.</td></tr>';
    return;
  }

  tb.innerHTML = tokens.map((t, idx) => `
    <tr>
      <td class="val">${idx + 1}</td>
      <td><span class="badge ${esc(t.type)}">${esc(t.type)}</span></td>
      <td class="val">${esc(t.value)}</td>
      <td class="val">${t.line}</td>
      <td class="val">${t.col}</td>
    </tr>`).join('');
}

/* â”€â”€ UI EVENT HANDLERS â”€â”€ */
const statusEl = document.getElementById('status');

document.getElementById('run').addEventListener('click', () => {
  const code = document.getElementById('code').value;
  if (!code.trim()) { statusEl.textContent = 'No code to tokenize.'; return; }
  statusEl.textContent = 'Lexingâ€¦';
  try {
    const tokens = tokenize(code);
    render(tokens);
    const lang = detectLang(code);
    statusEl.textContent = `âś… ${tokens.length} tokens â€” language: ${lang.toUpperCase()}`;
  } catch (e) {
    statusEl.textContent = 'âťŚ Error: ' + e.message;
    console.error(e);
  }
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('code').value = '';
  document.getElementById('tok-sum').innerHTML = '';
  document.getElementById('tok-tb').innerHTML = '<tr><td colspan="5" class="empty">Run the lexer.</td></tr>';
  statusEl.textContent = 'Ready';
});

document.getElementById('demo-c').addEventListener('click', () => {
  document.getElementById('code').value =
`#include <stdio.h>

/* Simple arithmetic demo */
int main() {
    int x = 2 + 3;
    float y = 3.14 * 2.0;
    char *msg = "hello";
    if (x > 4) {
        printf("x = %d\\n", x);
    }
    return 0;
}`;
  document.getElementById('run').click();
});

document.getElementById('demo-py').addEventListener('click', () => {
  document.getElementById('code').value =
`# Python demo
def add(a, b):
    return a + b

x = add(2, 3)
y = 3.14 * x
name = "world"
print(f"sum = {x}, pi_approx = {y}")

if x > 4:
    print("big number")
elif x == 4:
    print("exactly four")
else:
    print("small")`;
  document.getElementById('run').click();
});
</script>
</body>
